# Local development override — builds images locally instead of pulling from GHCR
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --build
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: corp-finance-monitor-backend:local

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: corp-finance-monitor-frontend:local

---
# corp-finance-monitor Phase 1B deployment playbook
#
# Usage:
#   ansible-playbook -i inventory playbook.yml
#
# Override variables via --extra-vars, e.g.:
#   ansible-playbook -i inventory playbook.yml \
#     --extra-vars "repo_path=/opt/cfm/corp-finance-monitor install_method=uv"
#
- name: Deploy corp-finance-monitor
  hosts: cfm
  become: yes
  roles:
    - cfm

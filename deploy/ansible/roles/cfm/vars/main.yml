---
# ── Deployment variables ──────────────────────────────────────────────────
# Override any via --extra-vars or group_vars/host_vars.

# Paths
repo_path: /home/lynskylate/corp-finance-monitor
venv_path: "{{ repo_path }}/.venv"
data_dir: "{{ repo_path }}/data"
config_path: "{{ repo_path }}/config.yaml"
dist_path: "{{ repo_path }}/dist"

# API service
listen_host: 127.0.0.1
listen_port: 8080
service_name: cfm-api

# Sync timer
sync_service_name: cfm-sync
timer_name: cfm-sync

# Logging
log_dir: /var/log/cfm

# OS user
cfm_user: cfm
cfm_group: cfm

# Install method: "uv" (default, after #16 migration) or "pip" (fallback, install from local .whl)
install_method: uv

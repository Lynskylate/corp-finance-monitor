services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        http_proxy: ""
        https_proxy: ""
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
    container_name: cfm-backend
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    networks:
      - cfm-net
    environment:
      - TZ=Asia/Shanghai

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cfm-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    networks:
      - cfm-net
    environment:
      - TZ=Asia/Shanghai

networks:
  cfm-net:
    driver: bridge

volumes:
  cfm-data:

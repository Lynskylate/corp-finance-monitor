services:
  backend:
    image: ghcr.io/lynskylate/corp-finance-monitor-backend:${IMAGE_TAG:-latest}
    container_name: cfm-backend
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    networks:
      - cfm-net
    environment:
      - TZ=Asia/Shanghai

  frontend:
    image: ghcr.io/lynskylate/corp-finance-monitor-frontend:${IMAGE_TAG:-latest}
    container_name: cfm-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8190:80"
    depends_on:
      - backend
    networks:
      - cfm-net
    environment:
      - TZ=Asia/Shanghai

networks:
  cfm-net:
    driver: bridge

name: Build Images And Open Release PR

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  RELEASE_CONFIG_REPOSITORY: Lynskylate/gtr-release-config

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Discover project services
        id: discover
        run: python ops/scripts/list_services.py --github-output "$GITHUB_OUTPUT"

  build-and-push:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ matrix.image_repository }}:${{ github.sha }}
            ${{ matrix.image_repository }}:latest
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed digest
        run: docker buildx imagetools inspect "${{ matrix.image_repository }}@${{ steps.build.outputs.digest }}"

      - name: Write release metadata
        run: |
          cat > "${{ runner.temp }}/${{ matrix.service_name }}.json" <<EOF
          {
            "service_name": "${{ matrix.service_name }}",
            "image_repository": "${{ matrix.image_repository }}",
            "image_digest": "${{ steps.build.outputs.digest }}",
            "image_tag": "${{ github.sha }}",
            "source_repository": "${{ github.repository }}",
            "source_run_id": "${{ github.run_id }}",
            "image_artifact": "release-image-${{ matrix.service_name }}",
            "dockerfile": "${{ matrix.dockerfile }}",
            "internal_port": ${{ matrix.internal_port }},
            "healthcheck_path": "${{ matrix.healthcheck_path }}",
            "exposure": "${{ matrix.exposure }}",
            "env_profile": "${{ matrix.env_profile }}"
          }
          EOF

      - name: Save release image archive
        run: |
          docker pull "${{ matrix.image_repository }}:${{ github.sha }}"
          docker save \
            -o "${{ runner.temp }}/${{ matrix.service_name }}.tar" \
            "${{ matrix.image_repository }}:${{ github.sha }}"

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ matrix.service_name }}
          path: ${{ runner.temp }}/${{ matrix.service_name }}.json

      - name: Upload release image archive
        uses: actions/upload-artifact@v4
        with:
          name: release-image-${{ matrix.service_name }}
          path: ${{ runner.temp }}/${{ matrix.service_name }}.tar
          retention-days: 7

  open-release-pr:
    if: github.ref_name == 'main' || github.ref_name == 'master'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          pattern: release-metadata-*
          merge-multiple: true
          path: release-metadata

      - name: Sync release repo GHCR pull token
        env:
          GH_TOKEN: ${{ secrets.RELEASE_CONFIG_REPO_TOKEN }}
          RELEASE_CONFIG_REPO_TOKEN: ${{ secrets.RELEASE_CONFIG_REPO_TOKEN }}
        run: |
          printf '%s' "$RELEASE_CONFIG_REPO_TOKEN" | gh secret set GHCR_READ_TOKEN --repo "${{ env.RELEASE_CONFIG_REPOSITORY }}"

      - name: Check out release config repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RELEASE_CONFIG_REPOSITORY }}
          path: release-config
          token: ${{ secrets.RELEASE_CONFIG_REPO_TOKEN }}

      - name: Update release stack digests
        run: >
          python ops/scripts/update_release_repo.py
          --release-repo-path release-config
          --environment prod
          --artifact-dir release-metadata

      - name: Create release PR
        id: release-pr
        uses: peter-evans/create-pull-request@v6
        with:
          path: release-config
          token: ${{ secrets.RELEASE_CONFIG_REPO_TOKEN }}
          branch: release/corp-finance-monitor-${{ github.sha }}
          commit-message: "release: update corp-finance-monitor digests for ${{ github.sha }}"
          title: "release: update corp-finance-monitor digests"
          body: |
            Automated release digest update from `${{ github.repository }}`.

            Source commit: `${{ github.sha }}`
          labels: |
            release
            automated

      - name: Auto-merge release PR
        if: steps.release-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_CONFIG_REPO_TOKEN }}
        run: >
          gh pr merge
          --repo "${{ env.RELEASE_CONFIG_REPOSITORY }}"
          --merge
          --delete-branch
          "${{ steps.release-pr.outputs.pull-request-number }}"
